name: Build BroAI APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Install Gradle
        run: cd android && gradle wrapper --gradle-version 7.6.1
      - name: Make gradlew executable
        run: chmod +x android/gradlew
      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace --info 2>&1 | tail -300
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BroAI-v10-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
